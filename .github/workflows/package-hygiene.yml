name: Package Hygiene

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:
    paths:
      - 'package.json'
      - 'packages/*/mcp/**'
      - 'packages/*/hooks/**'
      - 'packages/*/package.json'
      - 'packages/*/bunup.config.ts'
      - 'tsconfig.*'
      - '.github/workflows/package-hygiene.yml'
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Standard env
        uses: ./.github/actions/standard-ci-env
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Publint (package structure lint)
        run: bun run check:publint
      - name: Types validation (are-the-types-wrong)
        continue-on-error: true
        run: bun run check:types
      - name: Dry pack & artifact
        run: bun run pack:dry
      - name: Upload packed artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-tarball
          path: ./.pack/*.tgz
          retention-days: 14
