name: Discoverability AB

on:
  schedule:
    - cron: '30 18 * * 0-4'
  workflow_dispatch:
    inputs:
      force_baseline:
        description: 'Skip threshold alerting for this run and mark as forced baseline'
        required: false
        default: false
        type: boolean

concurrency:
  group: discoverability-ab
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  run-minimal-ab:
    name: Minimal AB Trend Run
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Standard env
        uses: ./.github/actions/standard-ci-env

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Evaluate minimal suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini-2025-04-14
        run: |
          bun scripts/discoverability/eval-ab.ts \
            --suite=minimal \
            --out=reports/ab/current-run.json

      - name: Format reports
        run: |
          bun scripts/discoverability/format-report.ts \
            --in=reports/ab/current-run.json \
            --csv=reports/ab/trend.csv \
            --latest=reports/ab/latest.md \
            --archive-dir=reports/ab/archive

      - name: Check thresholds
        id: thresholds
        continue-on-error: true
        env:
          FORCE_BASELINE: ${{ github.event.inputs.force_baseline || 'false' }}
        run: |
          EXTRA=""
          if [ "$FORCE_BASELINE" = "true" ]; then
            EXTRA="--force-baseline=true"
          fi

          bun scripts/discoverability/check-thresholds.ts \
            --csv=reports/ab/trend.csv \
            --out=reports/ab/thresholds.json \
            $EXTRA

      - name: Validate threshold output
        if: always()
        run: |
          if [ ! -s reports/ab/thresholds.json ]; then
            echo "::error::reports/ab/thresholds.json missing or empty; threshold evaluation likely failed."
            exit 1
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: discoverability-ab-${{ github.run_id }}
          path: |
            reports/ab/archive/*.json
            reports/ab/current-run.json
            reports/ab/thresholds.json
          retention-days: 30
          if-no-files-found: warn

      - name: Commit trend outputs
        run: |
          if [ -z "$(git status --porcelain -- reports/ab/trend.csv reports/ab/latest.md)" ]; then
            echo "No report changes to commit"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add reports/ab/trend.csv reports/ab/latest.md
          git commit -m "chore(discoverability): update minimal AB trend [skip ci]"
          git push

      - name: Manage regression issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          THRESHOLDS_JSON: reports/ab/thresholds.json
          SUMMARY_MD: reports/ab/latest.md
        with:
          script: |
            const fs = require('node:fs')

            if (!fs.existsSync(process.env.THRESHOLDS_JSON)) {
              core.warning('No thresholds.json found; skipping issue management.')
              return
            }

            const thresholds = JSON.parse(fs.readFileSync(process.env.THRESHOLDS_JSON, 'utf8'))
            const summary = fs.existsSync(process.env.SUMMARY_MD)
              ? fs.readFileSync(process.env.SUMMARY_MD, 'utf8')
              : 'No summary generated.'

            const owner = context.repo.owner
            const repo = context.repo.repo
            const label = 'eval-regression'
            const issueTitle = `[discoverability-ab] ${thresholds.suiteVersion} regression`

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label })
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Automated discoverability AB regression alerts',
                })
              } else {
                throw error
              }
            }

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            })

            const matchingIssue = openIssues.data.find((issue) => issue.title === issueTitle)

            if (thresholds.shouldAlert) {
              const body = [
                `Automated regression detected for \`${thresholds.suiteVersion}\`.`,
                '',
                `- Status: **${thresholds.status}**`,
                `- Reason: ${thresholds.reason}`,
                `- Alert streak: ${thresholds.alertStreak}`,
                `- Baseline runs: ${thresholds.baselineRunCount}`,
                '',
                '## Latest Summary',
                '',
                summary,
              ].join('\n')

              if (matchingIssue) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: matchingIssue.number,
                  body,
                })
              } else {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: issueTitle,
                  labels: [label],
                  body,
                })
              }
            }

            if (thresholds.shouldCloseAlert && matchingIssue) {
              const closeComment = [
                `Recovered: \`${thresholds.suiteVersion}\` is back within threshold.`,
                '',
                `- Status: **${thresholds.status}**`,
                `- Reason: ${thresholds.reason}`,
                '',
                '## Latest Summary',
                '',
                summary,
              ].join('\n')

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: matchingIssue.number,
                body: closeComment,
              })

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: matchingIssue.number,
                state: 'closed',
              })
            }

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Discoverability AB"
            echo
            if [ -f reports/ab/thresholds.json ]; then
              echo '```json'
              cat reports/ab/thresholds.json
              echo '```'
            else
              echo "No threshold output generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
