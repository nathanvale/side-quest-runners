name: Dependabot Auto-Merge
on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
permissions:
  contents: write
  pull-requests: write
jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Require auto-mergeable label
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: labels
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map(l => l.name)
            const allowed = ['dev-dependencies', 'github_actions']
            const hasAllowed = labels.some(l => allowed.includes(l))
            if (!hasAllowed) {
              core.setFailed(`PR labels [${labels.join(', ')}] do not include any of: ${allowed.join(', ')}`)
            }

      - name: Check changed files are safe to auto-merge
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: diff
        with:
          script: |
            const pr = context.payload.pull_request
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            })
            const filenames = files.map(f => f.filename)
            const allowed = [
              'package.json',
              'pnpm-lock.yaml',
              'package-lock.json',
              'yarn.lock',
              'bun.lock',
            ]
            const isGHA = filenames.every(f => f.startsWith('.github/'))
            const isDeps = filenames.every(f => allowed.includes(f))
            if (!isGHA && !isDeps) {
              core.setFailed('PR touches files outside dependency manifests and .github/')
            }

      - name: Dependabot metadata
        if: steps.diff.outcome == 'success' && steps.labels.outcome == 'success'
        id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7 # v2.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App token
        if: steps.diff.outcome == 'success' && steps.labels.outcome == 'success' && (steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch')
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Approve and enable auto-merge
        if: steps.app-token.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pr = context.payload.pull_request

            // Approve the PR
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'Auto-approved: minor/patch dependency update with safe file changes.',
            })
            core.info(`Approved PR #${pr.number}`)

            // Enable GitHub native auto-merge (waits for required checks)
            await github.graphql(`
              mutation($prId: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) { clientMutationId }
              }
            `, { prId: pr.node_id })
            core.info(`Auto-merge enabled for PR #${pr.number}`)
