name: Sensitive path review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    name: Sensitive path review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Require human approval for automation changes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request
            if (!pr) {
              core.info('No pull request context; nothing to enforce.')
              return
            }

            const sensitivePrefixes = [
              '.github/workflows/',
              '.github/actions/',
              '.github/scripts/',
            ]
            const sensitiveFiles = new Set([
              '.changeset/config.json',
              'scripts/setup.ts',
              'scripts/setup-protect.ts',
            ])

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const touchedSensitive = files
              .map((file) => file.filename)
              .filter((filename) =>
                sensitiveFiles.has(filename) ||
                sensitivePrefixes.some((prefix) => filename.startsWith(prefix)),
              )

            if (touchedSensitive.length === 0) {
              core.info('No sensitive automation files changed.')
              return
            }

            // In a user-owned template repo, the owner is the release authority.
            // Keep the extra human-approval gate for bots/collaborators, but
            // avoid forcing the owner to re-approve every iteration of their own PRs.
            if (pr.user.login === context.repo.owner) {
              core.info(
                `Sensitive automation files changed (${touchedSensitive.join(', ')}); skipping extra approval gate for repository owner-authored PR.`,
              )
              return
            }

            const labels = new Set((pr.labels || []).map((label) => label.name))
            // Dependabot workflow PRs can be authored by either the classic bot
            // account or the GitHub App-backed identity.
            const isDependabotAuthor =
              pr.user.login === 'dependabot[bot]' ||
              pr.user.login === 'app/dependabot'
            const onlyWorkflowFilesChanged =
              files.length > 0 &&
              files.every((file) => file.filename.startsWith('.github/workflows/'))
            const isDependabotWorkflowBump =
              isDependabotAuthor &&
              labels.has('github_actions') &&
              onlyWorkflowFilesChanged

            if (isDependabotWorkflowBump) {
              core.info(
                `Sensitive workflow files changed (${touchedSensitive.join(', ')}); skipping extra approval gate for safe Dependabot workflow update.`,
              )
              return
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const trustedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR'])
            const latestReviewByLogin = new Map()
            for (const review of reviews) {
              const login = review.user?.login
              if (!login) continue
              latestReviewByLogin.set(login, review)
            }

            const hasHumanApproval = [...latestReviewByLogin.values()].some(
              (review) =>
                review.state === 'APPROVED' &&
                trustedAssociations.has(review.author_association) &&
                review.commit_id === pr.head.sha &&
                review.user?.login &&
                review.user.login !== pr.user.login &&
                !review.user.login.endsWith('[bot]'),
            )

            if (!hasHumanApproval) {
              core.setFailed(
                `Sensitive automation files changed (${touchedSensitive.join(', ')}). Require at least one human approval before merge.`,
              )
              return
            }

            core.info(
              `Sensitive automation files changed (${touchedSensitive.join(', ')}); human approval detected.`,
            )
