name: Node.js Compatibility Check

on:
  # Verify the built CLI works on Node.js (since Bun is now primary runtime)
  pull_request:
    paths:
      - 'packages/*/mcp/**'
      - 'packages/*/hooks/**'
      - 'packages/*/package.json'
      - 'package.json'
      - 'tsconfig*.json'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  node-compat:
    name: Node.js Compatibility
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Standard CI Env
        uses: ./.github/actions/standard-ci-env

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (TypeScript)
        run: bun run build

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Verify ESM imports work on Node.js
        run: |
          for pkg in packages/*/dist/index.js; do
            if [ -f "$pkg" ]; then
              echo "Testing $pkg..."
              node -e "import('./$pkg').then(m => console.log('ESM import OK:', Object.keys(m)))"
            fi
          done
